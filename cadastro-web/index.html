<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página de Cadastro</title>
    <link rel="stylesheet" href="staly.css" />
  </head>
  <body>
    <main>
      <div class="container">
        <section class="lado-esquerdo">
          <div class="logo">
            <span>◆</span>
            <p>Nome</p>
          </div>
          <div class="texto">
            <h1>Comece sua <span class="destaque">jornada</span> Hoje</h1>
          </div>

          <div class="p">
            <p>
              Uma plataforma pensada para quem leva o trabalho a sério. Simples,
              rapida e segura
            </p>
          </div>

          <ul class="lista">
            <li><span> protegidos com criptorafia</span></li>
            <li><span> gratuito por 14 dias</span></li>
            <li><span>Suporte em portugês 24/7</span></li>
          </ul>
        </section>

        <section class="lado-direito">
          <h1>Criar conta</h1>
          <p class="acesso">Já tem uma conta?<a href="#">Entrar</a></p>

          <div class="dados">
            <span></span>
            <p>PREECHA OS DADOS</p>
            <span></span>
          </div>

          <section class="form">
            <div>
              <label for="text">NOME</label>
              <input type="text" placeholder="joão" />
            </div>
            <div>
              <label for="text">SOBRENOME</label>
              <input type="text" placeholder="Silva" />
            </div>
          </section>
          <div class="form2">
            <label for="email"> E-MAIL</label>
            <input type="email" placeholder="digite seu email" />
            <label for="senha">SENHA</label>
            <input type="text" placeholder="Minimo 8 caractere" />
            <label for="senha"> CONFIRMAR SENHA</label>
            <input type="text" placeholder="repita a senha" />
          </div>

          <button type="button">CRIAR CONTA</button>
        </section>
      </div>
    </main>
  </body>
</html>
